<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Webcam Streamer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #e0e0e0;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.running { background: #4ecca3; box-shadow: 0 0 8px #4ecca3; }
        .status-dot.stopped { background: #e94560; box-shadow: 0 0 8px #e94560; }
        .status-label { font-size: 1.1rem; font-weight: 600; }
        .info-grid {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .info-item {
            padding: 0.75rem 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .info-item label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8899aa;
            margin-bottom: 0.25rem;
        }
        .info-item .value {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.95rem;
            word-break: break-all;
            color: #4ecca3;
        }
        .info-item .value.muted { color: #8899aa; }
        .controls {
            display: flex;
            gap: 0.75rem;
        }
        .controls form { flex: 1; }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start { background: #4ecca3; color: #1a1a2e; }
        .btn-stop { background: #e94560; color: #fff; }
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8899aa;
            margin-bottom: 0.75rem;
        }
        .resolution-picker {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .resolution-options {
            display: flex;
            gap: 0.75rem;
        }
        .resolution-options label {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            background: #1a1a2e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: "SF Mono", "Fira Code", monospace;
            color: #8899aa;
            border: 2px solid transparent;
            transition: border-color 0.15s, color 0.15s;
        }
        .resolution-options input[type="radio"] {
            accent-color: #4ecca3;
            width: 15px;
            height: 15px;
        }
        .resolution-options label.selected {
            border-color: #4ecca3;
            color: #4ecca3;
        }
        .resolution-options label.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .resolution-msg {
            font-size: 0.75rem;
            color: #e94560;
            margin-top: 0.5rem;
            min-height: 1em;
        }
        .resolution-hint {
            font-size: 0.7rem;
            color: #667788;
            margin-top: 0.4rem;
        }
        .camera-controls {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .control-row {
            margin-bottom: 1rem;
        }
        .control-row:last-child { margin-bottom: 0; }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.35rem;
        }
        .control-header label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8899aa;
        }
        .control-header .control-value {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.85rem;
            color: #4ecca3;
            min-width: 3ch;
            text-align: right;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1a1a2e;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
            border: none;
        }
        .autofocus-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .autofocus-row input[type="checkbox"] {
            accent-color: #4ecca3;
            width: 16px;
            height: 16px;
        }
        .autofocus-row label {
            font-size: 0.8rem;
            color: #8899aa;
        }
        .control-msg {
            font-size: 0.75rem;
            color: #e94560;
            margin-top: 0.25rem;
            min-height: 1em;
        }
        .vlc-help {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #8899aa;
        }
        .vlc-help strong { color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#128249; Pi Webcam Streamer</h1>

        <div class="status-row">
            <div class="status-dot {{status_class}}"></div>
            <span class="status-label">{{status_text}}</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>RTSP URL</label>
                <div class="value">{{rtsp_url}}</div>
            </div>
            <div class="info-item">
                <label>Camera</label>
                <div class="value">{{device}}</div>
            </div>
            <div class="info-item">
                <label>Resolution</label>
                <div class="value" id="resolution-display">{{resolution}}</div>
            </div>
            <div class="info-item">
                <label>Uptime</label>
                <div class="value {{uptime_class}}" id="uptime-display" data-start="{{start_time}}">{{uptime}}</div>
            </div>
        </div>

        <div class="controls">
            <form method="POST" action="/start">
                <button type="submit" class="btn-start" {{start_disabled}}>Start</button>
            </form>
            <form method="POST" action="/stop">
                <button type="submit" class="btn-stop" {{stop_disabled}}>Stop</button>
            </form>
        </div>

        <div class="resolution-picker">
            <div class="section-title">Resolution</div>
            <div id="resolution-options" class="resolution-options">
                <div style="color:#8899aa; font-size:0.85rem;">Loading...</div>
            </div>
            <div id="resolution-msg" class="resolution-msg"></div>
            <div id="resolution-hint" class="resolution-hint"></div>
        </div>

        <div class="camera-controls">
            <div class="section-title">Camera Controls</div>
            <div id="controls-container">
                <div style="color:#8899aa; font-size:0.85rem;">Loading controls...</div>
            </div>
            <div id="controls-msg" class="control-msg"></div>
        </div>

        <div class="vlc-help">
            <strong>Connect with VLC:</strong><br>
            Media &rarr; Open Network Stream &rarr; paste the RTSP URL above.
        </div>
    </div>

    <script>
    (function() {
        /* ---- Resolution picker ---- */
        const resContainer = document.getElementById('resolution-options');
        const resMsgEl = document.getElementById('resolution-msg');
        const resHintEl = document.getElementById('resolution-hint');
        const resDisplay = document.getElementById('resolution-display');

        function fetchResolution() {
            fetch('/api/resolution')
                .then(r => r.json())
                .then(renderResolution)
                .catch(() => {
                    resContainer.innerHTML = '<div style="color:#8899aa;font-size:0.85rem;">Could not load resolution options.</div>';
                });
        }

        function renderResolution(data) {
            resContainer.innerHTML = '';
            resMsgEl.textContent = '';
            const locked = data.locked;
            resHintEl.textContent = locked ? 'Stop the stream to change resolution.' : '';

            for (const [key, label] of Object.entries(data.presets)) {
                const wrapper = document.createElement('label');
                wrapper.className = key === data.current ? 'selected' : '';
                if (locked) wrapper.classList.add('locked');

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'resolution';
                radio.value = key;
                radio.checked = key === data.current;
                radio.disabled = locked;

                radio.addEventListener('change', function() {
                    if (this.checked) setResolution(this.value);
                });

                const text = document.createTextNode(label);
                wrapper.appendChild(radio);
                wrapper.appendChild(text);
                resContainer.appendChild(wrapper);
            }
        }

        function setResolution(key) {
            resMsgEl.textContent = '';
            fetch('/api/resolution', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({resolution: key})
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    resMsgEl.textContent = data.error;
                    fetchResolution();
                } else {
                    renderResolution(data);
                    if (data.presets && data.current) {
                        resDisplay.textContent = data.presets[data.current];
                    }
                }
            })
            .catch(() => { resMsgEl.textContent = 'Failed to change resolution.'; });
        }

        fetchResolution();

        /* ---- Camera controls ---- */
        const container = document.getElementById('controls-container');
        const msgEl = document.getElementById('controls-msg');
        let debounceTimers = {};

        function fetchControls() {
            fetch('/api/controls')
                .then(r => r.json())
                .then(renderControls)
                .catch(() => {
                    container.innerHTML = '<div style="color:#8899aa;font-size:0.85rem;">Could not load camera controls (v4l2-ctl may not be installed).</div>';
                });
        }

        function renderControls(data) {
            container.innerHTML = '';
            const names = Object.keys(data);
            if (names.length === 0) {
                container.innerHTML = '<div style="color:#8899aa;font-size:0.85rem;">No adjustable controls detected for this camera.</div>';
                return;
            }

            // Autofocus checkbox (if focus_auto is available)
            if (data.focus_auto) {
                const autoRow = document.createElement('div');
                autoRow.className = 'autofocus-row';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.id = 'focus-auto-cb';
                cb.checked = data.focus_auto.value === 1;
                cb.addEventListener('change', function() {
                    sendControl('focus_auto', this.checked ? 1 : 0);
                    const slider = document.getElementById('slider-focus_absolute');
                    if (slider) slider.disabled = this.checked;
                });
                const lbl = document.createElement('label');
                lbl.htmlFor = 'focus-auto-cb';
                lbl.textContent = 'Autofocus';
                autoRow.appendChild(cb);
                autoRow.appendChild(lbl);
                container.appendChild(autoRow);
            }

            // Sliders for brightness and focus_absolute
            const sliderControls = ['brightness', 'focus_absolute'];
            for (const name of sliderControls) {
                if (!data[name]) continue;
                const info = data[name];
                const row = document.createElement('div');
                row.className = 'control-row';

                const header = document.createElement('div');
                header.className = 'control-header';
                const lbl = document.createElement('label');
                lbl.textContent = name === 'focus_absolute' ? 'Focus' : 'Brightness';
                const valSpan = document.createElement('span');
                valSpan.className = 'control-value';
                valSpan.id = 'val-' + name;
                valSpan.textContent = info.value;
                header.appendChild(lbl);
                header.appendChild(valSpan);

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.id = 'slider-' + name;
                slider.min = info.min;
                slider.max = info.max;
                slider.step = info.step || 1;
                slider.value = info.value;

                if (name === 'focus_absolute' && data.focus_auto && data.focus_auto.value === 1) {
                    slider.disabled = true;
                }

                slider.addEventListener('input', function() {
                    document.getElementById('val-' + name).textContent = this.value;
                });
                slider.addEventListener('change', function() {
                    clearTimeout(debounceTimers[name]);
                    debounceTimers[name] = setTimeout(() => {
                        sendControl(name, parseInt(this.value, 10));
                    }, 100);
                });

                row.appendChild(header);
                row.appendChild(slider);
                container.appendChild(row);
            }
        }

        function sendControl(name, value) {
            msgEl.textContent = '';
            const body = {};
            body[name] = value;
            fetch('/api/controls', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            })
            .then(r => r.json())
            .then(data => {
                if (data.errors) {
                    msgEl.textContent = Object.values(data.errors).join('; ');
                } else {
                    for (const [n, info] of Object.entries(data)) {
                        const valEl = document.getElementById('val-' + n);
                        const sliderEl = document.getElementById('slider-' + n);
                        if (valEl) valEl.textContent = info.value;
                        if (sliderEl) sliderEl.value = info.value;
                    }
                }
            })
            .catch(() => { msgEl.textContent = 'Failed to update control.'; });
        }

        fetchControls();

        /* ---- Live uptime ticker ---- */
        const uptimeEl = document.getElementById('uptime-display');
        function tickUptime() {
            const start = parseFloat(uptimeEl.dataset.start);
            if (!start) return;
            const elapsed = Math.floor(Date.now() / 1000 - start);
            if (elapsed < 0) return;
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            uptimeEl.textContent = h + ':' + m + ':' + s;
        }
        setInterval(tickUptime, 1000);
    })();
    </script>
</body>
</html>
