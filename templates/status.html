<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Webcam Streamer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #e0e0e0;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.running { background: #4ecca3; box-shadow: 0 0 8px #4ecca3; }
        .status-dot.stopped { background: #e94560; box-shadow: 0 0 8px #e94560; }
        .status-label { font-size: 1.1rem; font-weight: 600; }
        .info-grid {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .info-item {
            padding: 0.75rem 1rem;
            background: #0f3460;
            border-radius: 8px;
        }
        .info-item label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8899aa;
            margin-bottom: 0.25rem;
        }
        .info-item .value {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.95rem;
            word-break: break-all;
            color: #4ecca3;
        }
        .info-item .value.muted { color: #8899aa; }
        .controls {
            display: flex;
            gap: 0.75rem;
        }
        .controls form { flex: 1; }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start { background: #4ecca3; color: #1a1a2e; }
        .btn-stop { background: #e94560; color: #fff; }
        .vlc-help {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #8899aa;
        }
        .vlc-help strong { color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#128249; Pi Webcam Streamer</h1>

        <div class="status-row">
            <div class="status-dot {{status_class}}"></div>
            <span class="status-label">{{status_text}}</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>RTSP URL</label>
                <div class="value">{{rtsp_url}}</div>
            </div>
            <div class="info-item">
                <label>Camera</label>
                <div class="value">{{device}}</div>
            </div>
            <div class="info-item">
                <label>Resolution</label>
                <div class="value">{{resolution}}</div>
            </div>
            <div class="info-item">
                <label>Uptime</label>
                <div class="value {{uptime_class}}">{{uptime}}</div>
            </div>
        </div>

        <div class="controls">
            <form method="POST" action="/start">
                <button type="submit" class="btn-start" {{start_disabled}}>Start</button>
            </form>
            <form method="POST" action="/stop">
                <button type="submit" class="btn-stop" {{stop_disabled}}>Stop</button>
            </form>
        </div>

        <div class="vlc-help">
            <strong>Connect with VLC:</strong><br>
            Media &rarr; Open Network Stream &rarr; paste the RTSP URL above.
        </div>
    </div>
</body>
</html>
